name: 18. Sub Data
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Run Details'
        required: false
        default: 'Sub Data Gen'
      targetPythonVersion:
        description: 'Target Python version: 3.9 , 3.10, 3.11 ?'
        required: false
        type: string
        default: '3.12'
      runson:
          description: 'Runner OS. e.g: ubuntu-latest, windows-latest or macos-latest'
          required: false
          default: 'ubuntu-latest'
      subtype:
          description: 'subtype: update or add or remove'
          required: false
          default: 'update'
      userid:
        description: 'sub user ID'
        required: false
        type: number
        default: 0
      subvalue:
        description: 'sub value'
        required: false
        type: string
        default: '0'

  schedule:
  - cron: '29 * * * *'

run-name: ${{ inputs.name || 'Sub Data Gen'}}

jobs:

  Download_Sub_Data:

    runs-on: ${{ inputs.runson || 'ubuntu-latest'}} #ubuntu-latest #windows-latest
    permissions: write-all

    steps:
    - uses: actions/checkout@v4
      with:
        ref: SubData
        fetch-depth: 0  # Need full history to get accurate file commit times

    - name: Set up Python 
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.targetPythonVersion  || 3.12 }}

    - name: Environment setup 
      shell: bash
      run: |
        pip3 uninstall -y PKNSETools
        pip3 uninstall -y PKDevTools
        pip3 install PKDevTools
        pip3 install PKNSETools

    - name: Configure env.dev file
      shell: bash
      env:
          CHAT_ID_PROD : ${{secrets.CHAT_ID_PROD}}
          CHAT_ID_DEV : ${{secrets.CHAT_ID_DEV}}
          TOKEN_DEV : ${{secrets.TOKEN_DEV}}
          CHAT_IDADMIN_DEV : ${{secrets.CHAT_IDADMIN_DEV}}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TOKEN: ${{ secrets.TOKEN }}
          chat_idADMIN: ${{ secrets.chat_idADMIN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_PAT: ${{ secrets.CI_PAT }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
          TDU: ${{ secrets.TURSO_DATABASE_URL }}
          TAT: ${{ secrets.TURSO_AUTH_TOKEN }}
          MCU: ${{ secrets.MCU }}
          MCAP: ${{ secrets.MCAP }}
          MCL: ${{ secrets.MCL }}
          MS: ${{ secrets.MS }}
          PKG: ${{ secrets.PKG }}
          REPO_URL: ${{ secrets.REPO_URL }}
          KTOKEN: ${{ secrets.KTOKEN }}
          KUSER: ${{ secrets.KUSER }}
          KPWD: ${{ secrets.KPWD }}
          KTOTP: ${{ secrets.KTOTP }}
          DB_TYPE: "local"
          DB_TICKS: ${{ secrets.DB_TICKS }}
          TBTOKEN: ${{ secrets.TBTOKEN }}
          BBTOKEN: ${{ secrets.BBTOKEN }}
          Tel_API_ID: ${{ secrets.Tel_API_ID }}
          Tel_API_Hash: ${{ secrets.Tel_API_Hash }}
          Tel_Phone_Number: ${{ secrets.Tel_Phone_Number }}
          TEL_SESSION_DATA: ${{ secrets.TEL_SESSION_DATA }}
          SUBSCRIPTION_ENABLED: ${{ secrets.SUBSCRIPTION_ENABLED }}
      run: |
          # Quote all values to handle spaces properly
          cat > .env.dev << EOF
          CHAT_ID_PROD='$CHAT_ID_PROD'
          CHAT_ID_DEV='$CHAT_ID_DEV'
          TOKEN_DEV='$TOKEN_DEV'
          CHAT_IDADMIN_DEV='$CHAT_IDADMIN_DEV'
          CHAT_ID='$CHAT_ID'
          TOKEN='$TOKEN'
          chat_idADMIN='$chat_idADMIN'
          GITHUB_TOKEN='$GITHUB_TOKEN'
          CI_PAT='$CI_PAT'
          TURSO_TOKEN='$TURSO_TOKEN'
          TDU='$TDU'
          TAT='$TAT'
          MCU='$MCU'
          MCAP='$MCAP'
          MCL='$MCL'
          MS='$MS'
          PKG='$PKG'
          REPO_URL='$REPO_URL'
          KTOKEN='$KTOKEN'
          KUSER='$KUSER'
          KPWD='$KPWD'
          KTOTP='$KTOTP'
          DB_TYPE='$DB_TYPE'
          DB_TICKS='$DB_TICKS'
          TBTOKEN='$TBTOKEN'
          BBTOKEN='$BBTOKEN'
          Tel_API_ID='$Tel_API_ID'
          Tel_API_Hash='$Tel_API_Hash'
          Tel_Phone_Number='$Tel_Phone_Number'
          TEL_SESSION_DATA='$TEL_SESSION_DATA'
          SUBSCRIPTION_ENABLED='$SUBSCRIPTION_ENABLED'
          EOF
          
          echo "Created .env.dev file with secrets (values quoted)"
          cp .env.dev /home/runner/work/PKScreener/PKScreener/pkscreener/.env.dev
  
    - name: Update Sub Data
      shell: bash
      timeout-minutes: 5
      continue-on-error: true
      if: ${{ inputs.subtype == 'update' || inputs.subtype == ''}}
      run: |
        python3 .github/workflows/subworkflows.py --branchname SubData --updatesubscriptions
        ls -l results/Data
        git status

    - name: Add Sub Data
      shell: bash
      timeout-minutes: 2
      continue-on-error: true
      if: ${{ inputs.subtype == 'add' }}
      run: |
        python3 .github/workflows/subworkflows.py --branchname SubData --addsubscription --subscriptionvalue ${{ inputs.subvalue }} --userid ${{ inputs.userid }}
        ls -l results/Data
        git status
  
    - name: Remove Sub Data
      shell: bash
      timeout-minutes: 2
      continue-on-error: true
      if: ${{ inputs.subtype == 'remove' }}
      run: |
        python3 .github/workflows/subworkflows.py --branchname SubData --removesubscription --userid ${{ inputs.userid }}
        ls -l results/Data
        git status

    - name: Remove PDF files committed >=24 hours ago
      shell: bash
      timeout-minutes: 5
      continue-on-error: true
      run: |
        echo "🔍 Checking for PDF files committed >=24 hours ago in results/Data..."
        
        # Get current timestamp in UTC
        CURRENT_TIME=$(date +%s)
        # 24 hours in seconds
        CUTOFF_TIME=$((CURRENT_TIME - 24*60*60))
        
        # Convert to readable date for logging
        CUTOFF_DATE=$(date -u -d @$CUTOFF_TIME +"%Y-%m-%d %H:%M:%S" 2>/dev/null || date -u -r $CUTOFF_TIME +"%Y-%m-%d %H:%M:%S" 2>/dev/null)
        echo "⏰ Keeping files committed after: $CUTOFF_DATE UTC"
        
        REMOVED_COUNT=0
        TOTAL_SIZE=0
        
        # Find all PDF files in results/Data
        if [ -d "results/Data" ]; then
          # Get list of PDF files
          PDF_FILES=$(find results/Data -name "*.pdf" -type f 2>/dev/null | sort || true)
          
          if [ -n "$PDF_FILES" ]; then
            echo ""
            echo "📋 Found $(echo "$PDF_FILES" | wc -l) PDF files to check"
            echo ""
            
            while IFS= read -r pdf_file; do
              if [ -f "$pdf_file" ]; then
                # Get the commit date of this file using git log with full history
                # This requires fetch-depth: 0 to work correctly
                COMMIT_INFO=$(git log --follow -n 1 --pretty="format:%ct|%ci" -- "$pdf_file" 2>/dev/null)
                
                if [ -n "$COMMIT_INFO" ]; then
                  # Parse timestamp and date
                  COMMIT_TIMESTAMP=$(echo "$COMMIT_INFO" | cut -d'|' -f1)
                  COMMIT_DATE=$(echo "$COMMIT_INFO" | cut -d'|' -f2 | cut -d' ' -f1,2)
                  
                  if [ -n "$COMMIT_TIMESTAMP" ] && [ $COMMIT_TIMESTAMP -lt $CUTOFF_TIME ]; then
                    FILE_SIZE=$(stat -c %s "$pdf_file" 2>/dev/null || stat -f %z "$pdf_file" 2>/dev/null)
                    FILE_SIZE_MB=$((FILE_SIZE / 1024 / 1024))
                    FILE_AGE_HOURS=$(( (CURRENT_TIME - COMMIT_TIMESTAMP) / 3600 ))
                    FILE_AGE_DAYS=$((FILE_AGE_HOURS / 24))
                    
                    echo "  🗑️ REMOVING: $(basename "$pdf_file")"
                    echo "     └─ Committed: $COMMIT_DATE (${FILE_AGE_DAYS}d ${FILE_AGE_HOURS}h ago, ${FILE_SIZE_MB}MB)"
                    rm -f "$pdf_file"
                    REMOVED_COUNT=$((REMOVED_COUNT + 1))
                    TOTAL_SIZE=$((TOTAL_SIZE + FILE_SIZE))
                  else
                    FILE_AGE_HOURS=$(( (CURRENT_TIME - COMMIT_TIMESTAMP) / 3600 ))
                    if [ $FILE_AGE_HOURS -gt 24 ]; then
                      FILE_AGE_DAYS=$((FILE_AGE_HOURS / 24))
                      echo "  ✅ KEEPING: $(basename "$pdf_file")"
                      echo "     └─ Committed: $COMMIT_DATE (${FILE_AGE_DAYS}d ${FILE_AGE_HOURS}h ago) - Should have been removed?"
                    else
                      echo "  ✅ KEEPING: $(basename "$pdf_file")"
                      echo "     └─ Committed: $COMMIT_DATE (${FILE_AGE_HOURS}h ago) - Recent"
                    fi
                  fi
                else
                  # If git can't find commit info, check if file is new
                  if [ -f "$pdf_file" ]; then
                    # Check if file was created in this workflow
                    FILE_MOD_TIME=$(stat -c %Y "$pdf_file" 2>/dev/null || stat -f %m "$pdf_file" 2>/dev/null)
                    if [ $FILE_MOD_TIME -gt $CUTOFF_TIME ]; then
                      echo "  📄 NEW FILE: $(basename "$pdf_file") - keeping (created in this run)"
                    else
                      echo "  ⚠️ UNKNOWN: $(basename "$pdf_file") - no git history, keeping"
                    fi
                  fi
                fi
              fi
            done <<< "$PDF_FILES"
          else
            echo "No PDF files found in results/Data"
          fi
        fi
        
        TOTAL_SIZE_MB=$((TOTAL_SIZE / 1024 / 1024))
        echo ""
        echo "📊 Cleanup Summary: Removed $REMOVED_COUNT PDF files (${TOTAL_SIZE_MB}MB total)"
        echo ""

    - name: Push Sub Data
      continue-on-error: true
      timeout-minutes: 5
      shell: bash
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
        git config --global http.postBuffer 150000000
        git pull -v origin +SubData
        git add results/Data/*.pdf --force
        git add results/Data/*.pdf -u
        git commit -m "GitHub-Action-Workflow-SubData-(Default-Config)"
        git push -v -u origin +SubData
      env:
        GITHUB_TOKEN : ${{secrets.GITHUB_TOKEN}}
        
    - name: Squash Commits (Python)
      shell: bash
      timeout-minutes: 5
      continue-on-error: true
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git config --global http.postBuffer 150000000
        git pull -v origin +SubData
        python3 .github/workflows/squash.py --b SubData -m "GitHub-Action-Workflow-SubData-(Default-Config)"
      env:
        GITHUB_TOKEN : ${{secrets.GITHUB_TOKEN}}

    - name: Delete this workflow run
      continue-on-error: true
      shell: bash
      run: |
        gh run list --status success --limit 1000 --json databaseId -q '.[].databaseId' | xargs -IID gh api "repos/$(gh repo view --json nameWithOwner -q .nameWithOwner)/actions/runs/ID" -X DELETE
        gh run list --status cancelled --limit 1000 --json databaseId -q '.[].databaseId' | xargs -IID gh api "repos/$(gh repo view --json nameWithOwner -q .nameWithOwner)/actions/runs/ID" -X DELETE
      env:
        GH_TOKEN : ${{secrets.GITHUB_TOKEN}}
