name: 18. Sub Data
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Run Details'
        required: false
        default: 'Sub Data Gen'
      targetPythonVersion:
        description: 'Target Python version: 3.9 , 3.10, 3.11 ?'
        required: false
        type: string
        default: '3.12'
      runson:
          description: 'Runner OS. e.g: ubuntu-latest, windows-latest or macos-latest'
          required: false
          default: 'ubuntu-latest'
      subtype:
          description: 'subtype: update or add or remove'
          required: false
          default: 'update'
      userid:
        description: 'sub user ID'
        required: false
        type: number
        default: 0
      subvalue:
        description: 'sub value'
        required: false
        type: string
        default: '0'

  schedule:
  - cron: '29 * * * *'

run-name: ${{ inputs.name || 'Sub Data Gen'}}

jobs:

  Download_Sub_Data:

    runs-on: ${{ inputs.runson || 'ubuntu-latest'}} #ubuntu-latest #windows-latest
    permissions: write-all

    steps:
    - uses: actions/checkout@v4
      with:
        ref: SubData

    - name: Set up Python 
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.targetPythonVersion  || 3.12 }}

    - name: Environment setup 
      shell: bash
      run: |
        pip3 uninstall -y PKNSETools
        pip3 uninstall -y PKDevTools
        pip3 install PKDevTools
        pip3 install PKNSETools

    - name: Configure env.dev file
      shell: bash
      env:
          CHAT_ID_PROD : ${{secrets.CHAT_ID_PROD}}
          CHAT_ID_DEV : ${{secrets.CHAT_ID_DEV}}
          TOKEN_DEV : ${{secrets.TOKEN_DEV}}
          CHAT_IDADMIN_DEV : ${{secrets.CHAT_IDADMIN_DEV}}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TOKEN: ${{ secrets.TOKEN }}
          chat_idADMIN: ${{ secrets.chat_idADMIN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_PAT: ${{ secrets.CI_PAT }}
          TURSO_TOKEN: ${{ secrets.TURSO_TOKEN }}
          TDU: ${{ secrets.TURSO_DATABASE_URL }}
          TAT: ${{ secrets.TURSO_AUTH_TOKEN }}
          MCU: ${{ secrets.MCU }}
          MCAP: ${{ secrets.MCAP }}
          MCL: ${{ secrets.MCL }}
          MS: ${{ secrets.MS }}
          PKG: ${{ secrets.PKG }}
          REPO_URL: ${{ secrets.REPO_URL }}
          KTOKEN: ${{ secrets.KTOKEN }}
          KUSER: ${{ secrets.KUSER }}
          KPWD: ${{ secrets.KPWD }}
          KTOTP: ${{ secrets.KTOTP }}
          DB_TYPE: "local"
          DB_TICKS: ${{ secrets.DB_TICKS }}
          TBTOKEN: ${{ secrets.TBTOKEN }}
          BBTOKEN: ${{ secrets.BBTOKEN }}
          Tel_API_ID: ${{ secrets.Tel_API_ID }}
          Tel_API_Hash: ${{ secrets.Tel_API_Hash }}
          Tel_Phone_Number: ${{ secrets.Tel_Phone_Number }}
          TEL_SESSION_DATA: ${{ secrets.TEL_SESSION_DATA }}
          SUBSCRIPTION_ENABLED: ${{ secrets.SUBSCRIPTION_ENABLED }}
      run: |
          # Quote all values to handle spaces properly
          cat > .env.dev << EOF
          CHAT_ID_PROD='$CHAT_ID_PROD'
          CHAT_ID_DEV='$CHAT_ID_DEV'
          TOKEN_DEV='$TOKEN_DEV'
          CHAT_IDADMIN_DEV='$CHAT_IDADMIN_DEV'
          CHAT_ID='$CHAT_ID'
          TOKEN='$TOKEN'
          chat_idADMIN='$chat_idADMIN'
          GITHUB_TOKEN='$GITHUB_TOKEN'
          CI_PAT='$CI_PAT'
          TURSO_TOKEN='$TURSO_TOKEN'
          TDU='$TDU'
          TAT='$TAT'
          MCU='$MCU'
          MCAP='$MCAP'
          MCL='$MCL'
          MS='$MS'
          PKG='$PKG'
          REPO_URL='$REPO_URL'
          KTOKEN='$KTOKEN'
          KUSER='$KUSER'
          KPWD='$KPWD'
          KTOTP='$KTOTP'
          DB_TYPE='$DB_TYPE'
          DB_TICKS='$DB_TICKS'
          TBTOKEN='$TBTOKEN'
          BBTOKEN='$BBTOKEN'
          Tel_API_ID='$Tel_API_ID'
          Tel_API_Hash='$Tel_API_Hash'
          Tel_Phone_Number='$Tel_Phone_Number'
          TEL_SESSION_DATA='$TEL_SESSION_DATA'
          SUBSCRIPTION_ENABLED='$SUBSCRIPTION_ENABLED'
          EOF
          
          echo "Created .env.dev file with secrets (values quoted)"
          cp .env.dev /home/runner/work/PKScreener/PKScreener/pkscreener/.env.dev
  
    - name: Update Sub Data
      shell: bash
      timeout-minutes: 5
      continue-on-error: true
      if: ${{ inputs.subtype == 'update' || inputs.subtype == ''}}
      run: |
        python3 .github/workflows/subworkflows.py --branchname SubData --updatesubscriptions
        ls -l results/Data
        git status

    - name: Add Sub Data
      shell: bash
      timeout-minutes: 2
      continue-on-error: true
      if: ${{ inputs.subtype == 'add' }}
      run: |
        python3 .github/workflows/subworkflows.py --branchname SubData --addsubscription --subscriptionvalue ${{ inputs.subvalue }} --userid ${{ inputs.userid }}
        ls -l results/Data
        git status
  
    - name: Remove Sub Data
      shell: bash
      timeout-minutes: 2
      continue-on-error: true
      if: ${{ inputs.subtype == 'remove' }}
      run: |
        python3 .github/workflows/subworkflows.py --branchname SubData --removesubscription --userid ${{ inputs.userid }}
        ls -l results/Data
        git status

    - name: Push Sub Data
      continue-on-error: true
      timeout-minutes: 5
      shell: bash
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
        git config --global http.postBuffer 150000000
        # git remote update
        # git fetch
        git pull -v origin +SubData
        git add results/Data/*.pdf --force
        git add results/Data/*.pdf -u
        git commit -m "GitHub-Action-Workflow-SubData-(Default-Config)"
        git push -v -u origin +SubData
      env:
        GITHUB_TOKEN : ${{secrets.GITHUB_TOKEN}}
        
    - name: Squash Commits (Python)
      shell: bash
      timeout-minutes: 5
      continue-on-error: true
      run: |
        git config user.name github-actions
        git config user.email github-actions@github.com
        git config --global http.postBuffer 150000000
        git pull -v origin +SubData
        python3 .github/workflows/squash.py --b SubData -m "GitHub-Action-Workflow-SubData-(Default-Config)"
      env:
        GITHUB_TOKEN : ${{secrets.GITHUB_TOKEN}}

    - name: Delete this workflow run
      continue-on-error: true
      shell: bash
      run: |
        gh run list --status success --limit 1000 --json databaseId -q '.[].databaseId' | xargs -IID gh api "repos/$(gh repo view --json nameWithOwner -q .nameWithOwner)/actions/runs/ID" -X DELETE
        gh run list --status cancelled --limit 1000 --json databaseId -q '.[].databaseId' | xargs -IID gh api "repos/$(gh repo view --json nameWithOwner -q .nameWithOwner)/actions/runs/ID" -X DELETE
      env:
        GH_TOKEN : ${{secrets.GITHUB_TOKEN}}
